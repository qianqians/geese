name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Core crates (no GPU at runtime, but render needs wgpu deps) ──
  core:
    name: Core (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux deps (wgpu + X11)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libwayland-dev

      - name: Build scene
        run: cargo build --package scene

      - name: Test scene
        run: cargo test --package scene --lib

      - name: Build physics
        run: cargo build --package physics

      - name: Build physics_manager
        run: cargo build --package physics_manager

      - name: Build math
        run: cargo build --package math

      - name: Build asset
        run: cargo build --package asset

      - name: Build avatar
        run: cargo build --package avatar

      - name: Build camera
        run: cargo build --package camera

      - name: Build render
        run: cargo build --package render

  # ── Editor + Desktop (needs Python for PyO3) ─────────────────
  editor:
    name: Editor (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux deps (wgpu + Python)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libwayland-dev

      - name: Install macOS deps
        if: runner.os == 'macOS'
        run: brew install python3

      - name: Setup Python (Windows)
        if: runner.os == 'Windows'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build editor crate
        run: cargo build --package editor

      - name: Build desktop
        run: cargo build --package pydesktop

  # ── Server + Client (needs Python for PyO3 cdylib) ──────────
  server:
    name: Server (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libwayland-dev

      - name: Install macOS deps
        if: runner.os == 'macOS'
        run: brew install python3

      - name: Setup Python (Windows)
        if: runner.os == 'Windows'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build server
        run: cargo build --package geese_server

      - name: Build client
        run: cargo build --package geese_client
